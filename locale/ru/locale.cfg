[mod-name]
metal-and-stars=○🌐Металл и звезды

[mod-description]
metal-and-stars=○🌐Вселенная огромна, и есть другие способы покинуть Солнечную систему. Несколько новых направлений с новыми машинами, технологиями и уникальными процессами.

[mod-setting-name]
is-nix-frozen-enabled=Никс требует нагрева
is-micro-gravity-lab-all-science-enabled=Лаборатория микрогравитации может заниматься базовыми научными исследованиями.

[mod-setting-description]
is-nix-frozen-enabled=Это приведет к тому, что Никс будет нуждаться в нагреве, как это делает Аквило.
is-micro-gravity-lab-all-science-enabled=Это позволяет лаборатории микрогравитации заниматься базовыми научными исследованиями. Обычно она занимается только космическими науками

#Neumann is a surname. V is the roman numeral for 5.
#Nix is latin for night
#Circa is a latin similar word for ring
#Mirandus is from latin for surprise
#Calidus is from space exploration mod, means hot
#Senestella is from latin, means old star
[space-location-name]
shipyard=Нейман V
nix=Никс
ringworld=Кольцевой Мир
mirandus-a=Мирандус
calidus-senestella-gate-senestella=Звездные врата Калидуса
calidus-senestella-gate-calidus=Звездные врата Сенестелле

[space-location-description]
shipyard=Заброшенный спутник с необычно спокойными космическими руинами. В конструкции повсеместные неуправляемые наниты, микроскопические многоцелевые роботы, которые, вероятно, и разрушили ее, и сохранили до сих пор. Условия похожи на космическую платформу. [item=microgravity-assembler] и [item=neumann-conduit] разбросаны по руинам.
nix=Мир тундры с исключительно длинными и темными ночами. Также является домом для аномальных [entity=dark-matter-vent] которые содержат много энергии, если вы можете их собрать. [planet=nix] имеет условия замерзания, похожие на [planet=aquilo] - Ресурсов там много, но добывать их в холодных условиях может быть непросто.
ringworld=Кольцо, окружающее холодную звезду. Одна половина кольца покрыта водой и полностью заросла, а другая — пустыня. Здесь всегда день, поэтому солнечные технологии очень надёжны.
mirandus=Разрушенная планета, находящаяся в состоянии квантовой запутанности. Высадиться здесь невозможно, но астероиды на её орбите можно добыть для получения изменяющегося минерала, способного изменять атомы.
calidus-senestella-gate-senestella=Это врата, которые являются предшественником технологии, позволяющие кораблям быстро перемещаться между двумя точками в космосе. Эти врата ведут к Калидусу (стартовой системе).
calidus-senestella-gate-calidus=Это врата, которые являются предшественником технологии, позволяющие кораблям быстро перемещаться между двумя точками в космосе. Эти врата ведут к Сенестелле (Металл и звезды).


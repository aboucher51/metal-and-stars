[mod-name]
metal-and-stars=○🌐Metall und Sterne

[mod-description]
metal-and-stars=○🌐Es ist ein großes Universum da draußen und es gibt andere Möglichkeiten das Sonnensystem zu verlassen. Mehrere neue Ziele mit neuen Maschinen, Technologien und einzigartigen Prozessen.

[mod-setting-name]
is-nix-frozen-enabled=Nix erfordert Heizungen
is-micro-gravity-lab-all-science-enabled=Mikrogravitationslabor kann grundlegende Wissenschaft verarbeiten

[mod-setting-description]
is-nix-frozen-enabled=Dies wird bewirken, dass Nix Heizung wie Aquilo benötigt.
is-micro-gravity-lab-all-science-enabled=Dies ermöglicht es dem Mikrogravitationslabor, grundlegende Wissenschaftspakete zu verarbeiten. Normalerweise verarbeitet es nur Weltraumwissenschaft.

#Neumann is a surname. V is the roman numeral for 5.
#Nix is latin for night
#Circa is a latin similar word for ring
#Mirandus is from latin for surprise
#Calidus is from space exploration mod, means hot
#Senestella is from latin, means old star
[space-location-name]
shipyard=Neumann V
nix=Nix
ringworld=Circa
mirandus-a=Mirandus-A
calidus-senestella-gate-senestella=Calidus Sternentor
calidus-senestella-gate-calidus=Senestella Sternentor

[space-location-description]
shipyard=Ein verfallener Satellit mit ungewöhnlich ruhigen Weltraumtrümmern. Unkontrollierte Naniten, mikroskopisch kleine Mehrzweckroboter, sind allgegenwärtig auf der Struktur – vermutlich das, was sie sowohl zerstört als auch zusammengehalten hat. Die Bedingungen ähneln einer Weltraumplattform. [item=microgravity-assembler] und [item=neumann-conduit] sind überall in den Ruinen verstreut.
nix=Eine Tundra-Welt mit außergewöhnlich langen, dunklen Nächten. Auch Heimat von anomalen [entity=dark-matter-vent], die viel Energie enthalten, wenn man sie extrahieren kann. [planet=nix] hat gefrierende Bedingungen, ähnlich wie [planet=aquilo] – sie ist ressourcenreich, aber die Extraktion der Ressourcen in der Kälte kann herausfordernd sein.
ringworld=Eine konstruierte Ringwelt, die einen kühlen Stern umkreist. Die Hälfte des Rings mit Wasser ist vollständig überwuchert, die andere Hälfte ist eine Wüste. Es ist immer Tag hier, sodass Solartechnologie sehr zuverlässig ist.
mirandus=Ein zerbrochener Planet, der in Quantenverschränkung existiert. Hier kann man nicht landen, aber die Mirandit-Asteroiden in seinem Orbit können abgebaut werden für [item=quantite-a], ein sich veränderndes Mineral mit atomverschiebenden Eigenschaften.
calidus-senestella-gate-senestella=Technologie von den Uralten. Dieses Tor ermöglicht es Schiffen, schnell zwischen zwei Orten im Weltraum zu reisen. Dieses führt nach Calidus (dem Ausgangssystem).
calidus-senestella-gate-calidus=Technologie von den Uralten. Dieses Tor ermöglicht es Schiffen, schnell zwischen zwei Orten im Weltraum zu reisen. Dieses führt nach Senestella (Metall und Sterne).

